<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4488ff"/>
      <stop offset="100%" stop-color="#2244cc"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgC)"/>
  <!-- Cute claw character -->
  <!-- Wire / hat -->
  <rect x="244" y="30" width="24" height="80" rx="8" fill="#aaaaaa"/>
  <!-- Head (shoulder joint as face) -->
  <circle cx="256" cy="170" r="60" fill="#ffcc00"/>
  <!-- Eyes -->
  <ellipse cx="232" cy="158" rx="14" ry="18" fill="#ffffff"/>
  <ellipse cx="280" cy="158" rx="14" ry="18" fill="#ffffff"/>
  <circle cx="235" cy="162" r="9" fill="#333333"/>
  <circle cx="283" cy="162" r="9" fill="#333333"/>
  <!-- Eye shine -->
  <circle cx="239" cy="157" r="4" fill="#ffffff"/>
  <circle cx="287" cy="157" r="4" fill="#ffffff"/>
  <!-- Happy mouth -->
  <path d="M 232 190 Q 256 215 280 190" stroke="#cc6600" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Blush -->
  <ellipse cx="218" cy="188" rx="12" ry="8" fill="#ff9999" opacity="0.5"/>
  <ellipse cx="294" cy="188" rx="12" ry="8" fill="#ff9999" opacity="0.5"/>
  <!-- Left arm -->
  <g transform="rotate(30, 200, 230)">
    <rect x="188" y="230" width="18" height="100" rx="7" fill="#ffcc00"/>
    <rect x="170" y="320" width="40" height="12" rx="6" fill="#ffaa00"/>
    <rect x="170" y="332" width="40" height="10" rx="5" fill="#ee3333"/>
  </g>
  <!-- Right arm -->
  <g transform="rotate(-30, 312, 230)">
    <rect x="306" y="230" width="18" height="100" rx="7" fill="#ffcc00"/>
    <rect x="302" y="320" width="40" height="12" rx="6" fill="#ffaa00"/>
    <rect x="302" y="332" width="40" height="10" rx="5" fill="#ee3333"/>
  </g>
  <!-- Items around -->
  <text x="50" y="380" font-size="60" font-family="sans-serif">🚗</text>
  <text x="370" y="370" font-size="55" font-family="sans-serif">🦕</text>
  <text x="60" y="480" font-size="50" font-family="sans-serif">🎵</text>
  <text x="360" y="480" font-size="50" font-family="sans-serif">🐠</text>
  <!-- Stars -->
  <text x="80" y="100" font-size="40" font-family="sans-serif">✨</text>
  <text x="380" y="120" font-size="35" font-family="sans-serif">✨</text>
</svg>
