<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffdd44"/>
      <stop offset="100%" stop-color="#ff8800"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6699"/>
      <stop offset="100%" stop-color="#cc3388"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgD)"/>
  <!-- Gift box -->
  <rect x="100" y="260" width="312" height="200" rx="16" fill="url(#box)"/>
  <rect x="100" y="260" width="312" height="40" rx="16" fill="#ff88bb"/>
  <!-- Ribbon -->
  <rect x="240" y="260" width="32" height="200" rx="4" fill="#ffdd44"/>
  <rect x="100" y="270" width="312" height="20" rx="4" fill="#ffdd44"/>
  <!-- Bow -->
  <ellipse cx="230" cy="255" rx="35" ry="25" fill="#ffdd44"/>
  <ellipse cx="282" cy="255" rx="35" ry="25" fill="#ffdd44"/>
  <circle cx="256" cy="260" r="12" fill="#ffaa00"/>
  <!-- Items popping out -->
  <text x="80" y="250" font-size="65" font-family="sans-serif">🚗</text>
  <text x="310" y="230" font-size="60" font-family="sans-serif">🦕</text>
  <text x="170" y="180" font-size="55" font-family="sans-serif">🐠</text>
  <text x="320" y="140" font-size="50" font-family="sans-serif">🎵</text>
  <text x="100" y="140" font-size="45" font-family="sans-serif">🏁</text>
  <!-- Stars and sparkles -->
  <text x="60" y="80" font-size="50" font-family="sans-serif">⭐</text>
  <text x="390" y="70" font-size="45" font-family="sans-serif">✨</text>
  <text x="420" y="450" font-size="35" font-family="sans-serif">🌟</text>
  <text x="50" y="430" font-size="30" font-family="sans-serif">✨</text>
</svg>
